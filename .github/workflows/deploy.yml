name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  # Step 1: semantic-release 分析 commit，自动打 tag + 生成 GitHub Release
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: echo "🚀 Released v${{ steps.semantic.outputs.new_release_version }}"

  # Step 2: 有新版本发布时，自动部署到 EC2
  deploy:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'packages/backend/node_modules' \
            --exclude 'packages/frontend/node_modules' \
            --exclude 'packages/frontend/build' \
            -e "ssh" \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app

      - name: Build frontend and deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            cd ~/app

            # 写入 .env 文件供 docker-compose 使用（替代 bashrc）
            cat > .env << 'ENVEOF'
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENVEOF

            # 确保 Docker Compose v2 已安装（修复 v1 的 ContainerConfig 错误）
            if ! docker compose version &>/dev/null; then
              echo "Installing Docker Compose v2 plugin..."
              sudo mkdir -p /usr/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
                -o /usr/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/lib/docker/cli-plugins/docker-compose
            fi

            # 停掉所有旧容器并重新 build 启动（后端在 Docker 内 build）
            echo "Restart docker containers"
            docker compose -p whattoeat-prod down 2>/dev/null || true
            docker compose -f docker-compose.yml -p whattoeat-prod up -d --build

            echo "✅ Deployed v${{ needs.release.outputs.new_release_version }}"
          ENDSSH
