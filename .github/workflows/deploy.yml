name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  # Step 0: Run tests before release (CI gate)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci --prefix packages/backend

      - name: Run backend unit tests
        run: npm run test:unit --prefix packages/backend -- --ci --coverage

      - name: Run backend integration tests
        run: npm run test:integration --prefix packages/backend -- --ci

  # Step 1: semantic-release 分析 commit，自动打 tag + 生成 GitHub Release
  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: echo "🚀 Released v${{ steps.semantic.outputs.new_release_version }}"

  # Step 2a: 前端部署到 S3 + CloudFront
  deploy-frontend:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --prefix packages/frontend

      - name: Build frontend
        run: CI=false npm run build --prefix packages/frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Upload to S3
        run: aws s3 sync packages/frontend/build/ s3://mealdice-frontend/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E22MA8FD1ZLL3G --paths "/*"

  # Step 2b: 后端部署到 ECS Fargate
  # 流程：Build Docker image → Push to ECR → 触发 ECS rolling deployment
  deploy-backend:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_REGION: us-east-2
      ECR_REPOSITORY: mealdice-backend
      ECS_CLUSTER: mealdice-backend-cluster
      ECS_SERVICE: mealdice-backend-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.release.outputs.new_release_version }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                        ./packages/backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
          echo "✅ Deployed v${{ needs.release.outputs.new_release_version }} to ECS Fargate"
