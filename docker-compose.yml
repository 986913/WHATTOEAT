# 生产环境 docker-compose
# 启动命令：docker compose -p whattoeat-prod up -d --build
# 只包含 backend 服务（NestJS API）
# 前端已迁移至 S3 + CloudFront，Nginx 已移除，ALB 处理 HTTPS 和负载均衡
# Redis 已迁移至 AWS ElastiCache
# 环境变量从项目根目录的 .env 文件读取（由 CI/CD 部署时写入）

services:
  backend:
    build: ./packages/backend # 使用 packages/backend/Dockerfile 构建镜像
    container_name: backend-eat
    environment: # 传入容器的环境变量，供 NestJS ConfigService 读取
      NODE_ENV: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    ports:
      - '3001:3001' # 暴露给 ALB，ALB 通过 EC2:3001 访问后端
    restart: unless-stopped
