# 这个文件启动：docker-compose -p whattoeat-prod up -d --build

services:
  backend:
    build: ./packages/backend
    container_name: backend-eat
    environment:
      NODE_ENV: production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  nginx:
    build: ./packages/frontend
    container_name: nginx-eat
    ports:
      - '8000:8000'
    depends_on:
      - backend

volumes:
  mysql_data:
