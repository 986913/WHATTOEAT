# ============================================================================
# 📦 docker-compose.yml — 架构演变历史存档
# ============================================================================
#
# ⚠️ 状态：此文件已废弃
# 生产部署已全面迁移至 AWS ECS Fargate，本地开发请使用 docker-compose.db.yml
# 保留此配置文件仅供参考，用于记录迁移前的生产环境部署方式。
#
# ----------------------------------------------------------------------------
# 🏗️ 【迁移前】单机 EC2 容器部署架构
# ----------------------------------------------------------------------------
# 服务划分：
#   - nginx:   反向代理 (处理 HTTPS，转发 /api 至 backend，其余至前端静态文件)
#   - backend: NestJS API 服务 (端口 3001)
#   - redis:   缓存服务 (端口 6379)
#
# 流量路径：
#   用户 → EC2 公网 IP → Nginx (:443) → Backend (:3001) → Redis (:6379)
#
# 部署方式：
#   CI (rsync 代码至 EC2) → docker compose up --build
#
# ----------------------------------------------------------------------------
# ☁️ 【迁移后】AWS 云原生托管架构
# ----------------------------------------------------------------------------
# 服务演进：
#   - Nginx    → 移除，由 ALB (HTTPS 终止 + 负载均衡) + CloudFront (前端 CDN) 替代
#   - Redis    → 迁移至 AWS ElastiCache (托管型 Redis，支持 TLS，自动 Failover)
#   - Backend  → 迁移至 AWS ECS Fargate (Serverless 容器，免除 EC2 节点运维)
#   - Frontend → 迁移至 S3 (静态文件存储) + CloudFront (全球 CDN 加速)
#
# 流量路径：
#   用户 → CloudFront (前端) / ALB (API) → Fargate Tasks → ElastiCache / RDS
#
# 部署方式：
#   CI (构建镜像) → 推送至 ECR → ECS 触发滚动更新 (Rolling Deployment)
# ============================================================================

