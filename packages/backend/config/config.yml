# 共享默认配置（所有环境通用）
# 敏感信息统一通过 ${ENV_VAR} 从 .env / 环境变量读取

db:
  mysql:
    type: mysql
    sync: true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
redis:
  host: 127.0.0.1
  port: 6379
  ttl: 120
log:
  level: info
  on: true
secrets:
  jwtsecret: ${JWT_SECRET}
google:
  clientId: ${GOOGLE_CLIENT_ID}
  clientSecret: ${GOOGLE_CLIENT_SECRET}
mail:
  user: ${MAIL_USER}
  pass: ${MAIL_PASS}
