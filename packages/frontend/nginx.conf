# nginx 配置 - 同时承担两个角色：
# 1. 静态文件服务器：托管 React 构建产物
# 2. 反向代理：将 /api/v1 请求转发到后端容器

server {
    listen 8000;                                # 监听 8000 端口（对外唯一入口）

    root /usr/share/nginx/html;                 # React build 产物目录
    index index.html;

    # 前端 SPA 路由
    # 所有非文件请求都返回 index.html，让 React Router 在客户端处理路由
    # 例如：/home/wkplans → 找不到文件 → 返回 index.html → React Router 匹配到对应组件
    location / {
        try_files $uri /index.html;
    }

    # 后端 API 反向代理
    # /api/v1/* 请求转发到 backend 容器的 3001 端口
    # "backend" 是 docker-compose.yml 中定义的服务名，Docker 内部 DNS 自动解析为容器 IP
    location /api/v1 {
        proxy_pass http://backend:3001/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                                    # 保留原始请求的 Host
        proxy_set_header X-Real-IP $remote_addr;                        # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;    # 传递代理链 IP
    }
}
