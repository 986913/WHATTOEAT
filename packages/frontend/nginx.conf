# nginx 配置 - 三个角色：
# 1. HTTP → HTTPS 自动跳转
# 2. 静态文件服务器：托管 React 构建产物
# 3. 反向代理：将 /api/v1 请求转发到后端容器

# HTTP 请求全部 301 跳转到 HTTPS
server {
    listen 80;
    server_name mealdice.com www.mealdice.com;
    return 301 https://mealdice.com$request_uri;
}

# www 跳转到裸域（统一 URL）
server {
    listen 443 ssl;
    server_name www.mealdice.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://mealdice.com$request_uri;
}

# 主服务 - HTTPS
server {
    listen 443 ssl;
    server_name mealdice.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    root /usr/share/nginx/html;                 # React build 产物目录
    index index.html;

    # 前端 SPA 路由
    # 所有非文件请求都返回 index.html，让 React Router 在客户端处理路由
    location / {
        try_files $uri /index.html;
    }

    # 后端 API 反向代理
    # /api/v1/* 请求转发到 backend 容器的 3001 端口
    # "backend" 是 docker-compose.yml 中定义的服务名，Docker 内部 DNS 自动解析为容器 IP
    location /api/v1 {
        proxy_pass http://backend:3001/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
